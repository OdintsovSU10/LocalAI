# Copy to config/google-discovery.yaml and set parentFolderUrl.
# Do not commit real folder URLs if they expose private project names.
parentFolderUrl: https://drive.google.com/drive/folders/REPLACE_WITH_PARENT_FOLDER_ID
browserProfileDir: "%LOCALAPPDATA%/LocalAI/google-browser"
minMatchScore: 5
requireConfidentMatch: true
includeSheetTabs: true
syncAfterDiscovery: true
headless: false
